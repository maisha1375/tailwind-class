<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xpense Lesson - Start</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main class="max-w-5xl mx-auto px-6">
      <nav
        class="flex justify-between items-center border-b-2 border-gray-300 py-6"
      >
        <h1 class="font-extrabold text-green-700">XpenseApp</h1>
        <ul class="flex items-center font-midium gap-6">
          <li>
            <a href="#" class="hover:text-green-700 transition">Features</a>
          </li>
          <li>
            <a href="#" class="hover:text-green-700 transition">Pricing</a>
          </li>
          <li>
            <button
              class="bg-green-700 text-white px-5 py-2 rounded-full hover:bg-violet-800 transition"
            >
              Login
            </button>
          </li>
        </ul>
      </nav>

      <section class="py-20">
        <h2 class="mb-6 text-7xl text-center font-extrabold">
          Track your expenses <span class="text-green-700">effortlessly.</span>
        </h2>
        <p class="text-center text-lg max-w-2xl mx-auto mb-10">
          The smartest way to manage your personal finance in 2026.
        </p>
        <div class="flex justify-center gap-4">
          <button
            class="bg-gray-900 text-white px-8 py-3 rounded-lg font-semibold hover:scale-105 transition transform"
          >
            Get Started
          </button>
          <button
            class="border border-gray-300 px-8 py-3 rounded-lg font-semibold hover:bg-white transition transform"
          >
            View Demo
          </button>
        </div>
      </section>

      <div
        class="max-w-sm mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100 hover:border-violet-200 transition"
      >
        <div
          class="mb-4 bg-violet-100 size-12 rounded-lg flex items-center justify-center"
        >
          🛡️
        </div>
        <h3 class="mb-2 text-xl font-bold">Secure Sync</h3>
        <p class="text-gray-500 leading-relaxed">
          Your data is encrypted and synced across all devices instantly.
        </p>
      </div>
    </main>
  </body>
</html>
